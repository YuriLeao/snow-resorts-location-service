# Local dev profile ($0). Connects to the Docker Compose Postgres + Redis started by `make dev`.
spring:
  datasource:
    url: jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/snow_resorts?currentSchema=location
    username: snow
    password: snow
  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    com.snowresorts.location: DEBUG
